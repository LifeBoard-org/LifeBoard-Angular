<app-board-header [(boardDate)]="boardDate" [isPanning]="isPanning()"
    (togglePanning)="togglePanning()"></app-board-header>
<div class="viewport " (mousedown)="onMouseDown($event)" (touchstart)="onTouchStart($event)"
    (contextmenu)="$event.preventDefault()" [style.cursor]="cursorStyle()">
    <div class="canvas-surface" [style.transform]="surfaceTransform()">
        <div class="bg-dot-pattern"></div>
        @for (item of boardItems(); track item.id) {
        <div class="rounded board-item shadow-elevation-1 group/board" tabindex="0" cdkDrag
            [cdkDragDisabled]=" isPanning() || isResizingItem" (cdkDragEnded)="onDragEnded($event, item)"
            [style.left.px]="item.x" [style.top.px]="item.y" [style.width.px]="item.width"
            [style.height.px]="item.height">
            <div
                class="rounded h-full w-full bg-transparent border-2 border-transparent   border-solid group-focus-within/board:border-black/50 dark:group-focus-within/board:border-white/50">
                <app-note [content]="item.content" [dateRangeType]="item.dateRangeType || 'day'"
                    (dateRangeTypeChange)="updateItemDateRange(item, $event)"></app-note>
            </div>

            <!-- Absolute drag and edit handles -->
            @if (!item.content.isEditing) {
            <div
                class="w-0 p-1 h-0 overflow-hidden absolute bottom-0 right-0 flex items-center gap-2 group-focus/board:h-auto group-focus/board:h-auto group-focus-within/board:h-auto group-focus/board:w-auto group-focus/board:w-auto group-focus-within/board:w-auto group-focus/board:-right-[40px] group-focus/board:-right-[40px] group-focus-within/board:-right-[40px] rounded transition-all z-10 flex flex-col">
                <div cdkDragHandle
                    class="bg-black/10 hover:bg-black/20 dark:bg-white/10 dark:hover:bg-white/20 text-text-primary rounded-full w-8 h-8 flex items-center justify-center cursor-grab active:cursor-grabbing">
                    <span class="material-symbols-outlined text-[18px]">drag_indicator</span>
                </div>
                <button (click)="editItem(item)"
                    class="bg-black/10 hover:bg-black/20 dark:bg-white/10 dark:hover:bg-white/20 text-text-primary rounded-full w-8 h-8 flex items-center justify-center cursor-pointer">
                    <span class="material-symbols-outlined text-[18px]">edit</span>
                </button>
            </div>
            }

            <div class="resize-handle p-4" (mousedown)="startResizing($event, item)"
                (touchstart)="startResizingTouch($event, item)"></div>
        </div>
        }
    </div>

    <div
        class="fixed bottom-4 left-4 bg-surface p-3 rounded shadow pointer-events-none text-xs font-mono hidden md:block">
        Zoom: {{ zoom().toFixed(2) }}<br>
        X: {{ panX().toFixed(0) }}<br>
        Y: {{ panY().toFixed(0) }}
    </div>

    <div class="fixed bottom-4 right-4 z-50 flex flex-col items-end gap-4">
        <!-- FAB Container -->
        <!-- <div class="bottom-[70%] absolute bg-primary w-[80%] rounded right-[10%] overflow-hidden pb-10">
            @for (item of itemTypes; track $index) {
                <div (click)="addItem(item.type)" >{{item.name}}</div>
            }
        </div> -->
        <button (click)="addItem('note')"
            class="flex items-center justify-center gap-3 bg-primary text-[#122118] h-12 w-12 md:w-auto md:pl-5 md:pr-7 rounded-full md:rounded-2xl shadow-elevation-3 hover:brightness-110 active:scale-95 transition-all duration-300 group">

            <span
                class="material-symbols-outlined text-[28px] transition-transform duration-300 group-hover:rotate-90">add</span>
            <span class="text-base font-bold tracking-wide hidden md:block">Add Item</span>
        </button>
    </div>
</div>
@if(activeItem()){
<div
    class="w-screen h-screen bg-black/50 backdrop-blur-sm fixed top-0 left-0 z-50 flex items-center justify-center animate-fade-in">
    <div class="w-[600px] h-[400px]">
        <app-note [content]="activeItem()!.content" [dateRangeType]="activeItem()!.dateRangeType || 'day'"
            (dateRangeTypeChange)="updateActiveItemDateRange($event)" (closeModal)="closeModal()"></app-note>
    </div>
</div>
}
