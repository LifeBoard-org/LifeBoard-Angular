<main class="relative top-0 flex h-screen w-full flex-col justify-start items-center  overflow-y-auto p-4 sm:p-6 gap-8 ">

  <!-- Header Section -->
  <h1 class="text-3xl font-bold tracking-tight  text-gray-400">Create Your LifeBoard</h1>

  <!-- Form Field -->
  <form class="w-full max-w-sm space-y-8 mt-10">

  <!-- Full Name -->
  <div class="relative">
    <input type="text" required placeholder=" "
      class="peer w-full bg-transparent border-0 border-b-2 border-gray-300
             py-2 text-base
             outline-none focus:outline-none focus:ring-0
             focus:border-[#248d4c]" />

    <label
      class="absolute left-0 top-2 text-gray-400
             transition-all duration-300
             peer-focus:-top-5 peer-focus:text-sm peer-focus:text-[#248d4c]
             peer-valid:-top-5 peer-valid:text-sm peer-valid:text-[#248d4c]">
      Full Name
    </label>

    <span
      class="absolute left-0 bottom-0 h-[2px] w-0 bg-[#248d4c]
             transition-all duration-300 peer-focus:w-full">
    </span>
  </div>


  <!-- Email -->
  <div class="relative">
    <input type="email" required placeholder=" "
      class="peer w-full bg-transparent border-0 border-b-2 border-gray-300
             py-2 text-base
             outline-none focus:outline-none focus:ring-0
             focus:border-[#248d4c]" />

    <label
      class="absolute left-0 top-2 text-gray-400
             transition-all duration-300
             peer-focus:-top-5 peer-focus:text-sm peer-focus:text-[#248d4c]
             peer-valid:-top-5 peer-valid:text-sm peer-valid:text-[#248d4c]">
      Email
    </label>

    <span
      class="absolute left-0 bottom-0 h-[2px] w-0 bg-[#248d4c]
             transition-all duration-300 peer-focus:w-full">
    </span>
  </div>


  <!-- Password -->
  <div class="relative">
    <input type="password" required placeholder=" "
      class="peer w-full bg-transparent border-0 border-b-2 border-gray-300
             py-2 text-base
             outline-none focus:outline-none focus:ring-0
             focus:border-[#248d4c]" />

    <label
      class="absolute left-0 top-2 text-gray-400
             transition-all duration-300
             peer-focus:-top-5 peer-focus:text-sm peer-focus:text-[#248d4c]
             peer-valid:-top-5 peer-valid:text-sm peer-valid:text-[#248d4c]">
      Password
    </label>

    <span
      class="absolute left-0 bottom-0 h-[2px] w-0 bg-[#248d4c]
             transition-all duration-300 peer-focus:w-full">
    </span>
  </div>


  <!-- Confirm Password -->
  <div class="relative">
    <input type="password" required placeholder=" "
      class="peer w-full bg-transparent border-0 border-b-2 border-gray-300
             py-2 text-base
             outline-none focus:outline-none focus:ring-0
             focus:border-[#248d4c]" />

    <label
      class="absolute left-0 top-2 text-gray-400
             transition-all duration-300
             peer-focus:-top-5 peer-focus:text-sm peer-focus:text-[#248d4c]
             peer-valid:-top-5 peer-valid:text-sm peer-valid:text-[#248d4c]">
      Confirm Password
    </label>

    <span
      class="absolute left-0 bottom-0 h-[2px] w-0 bg-[#248d4c]
             transition-all duration-300 peer-focus:w-full">
    </span>
  </div>

  </form>

  <!-- Terms Checkbox (Optional enhancement for clarity) -->
  <div class="flex items-start pt-1 w-full max-w-sm ">

  <!-- Hidden Checkbox -->
  <input type="checkbox" id="terms" class="peer hidden" />

  <!-- Circular Custom Checkbox -->
  <label for="terms"
    class="mt-1 h-4 w-4 flex items-center justify-center
           rounded-full border-2 border-gray-300
           cursor-pointer
           transition-all duration-300 ease-in-out
           peer-checked:bg-[#248d4c]
           peer-checked:border-[#248d4c]">

    <!-- Check Icon -->
    <svg class="w-2.5 h-2.5 text-white
                scale-0 opacity-0
                transition-all duration-200 ease-in-out
                peer-checked:scale-100 peer-checked:opacity-100"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>

  </label>

  <!-- Text -->
  <div class="ml-3 text-sm leading-6">
    <label for="terms" class="text-gray-500 cursor-pointer">
      I agree to the
      <a href="#"
        class="font-semibold text-[#102217] hover:text-[#248d4c] hover:underline underline-offset-2">
        Terms
      </a>
      and
      <a href="#"
        class="font-semibold text-[#102217] hover:text-[#248d4c] hover:underline underline-offset-2">
        Privacy Policy
      </a>.
    </label>
  </div>

  </div>

  <!--Create Account Button-->
  <div class="w-full flex justify-center mt-3">

  <button
    class="group w-sm flex items-center justify-center gap-2
           py-3 rounded-2xl
           bg-[#102217] text-white font-semibold
           transition duration-[1s]
           hover:bg-[#248d4c]
           active:scale-95"
    routerLink="/dashboard"
    type="submit">

    <!-- Text -->
    <span>Create Account</span>

    <!-- Arrow Icon -->
    <span
      class="material-symbols-outlined text-[20px]
             transition-transform duration-200
             group-hover:translate-x-1">
      arrow_forward
    </span>

  </button>

  </div>

  <!-- Divider -->
     <div class="relative flex items-center py-2 w-lg mt-4">
    <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
    <span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-medium">Already have an Account?</span>
    <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
  </div>

</main>
