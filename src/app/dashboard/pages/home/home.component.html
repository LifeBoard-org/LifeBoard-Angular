<div class=" w-full p-4 md:p-8 lg:p-15 flex flex-col gap-8 md:gap-12">

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

        <div
            class="lg:col-span-8 flex flex-col justify-between rounded-[2rem] bg-surface p-6 md:p-8 relative overflow-hidden group">
            <div class="relative z-10 flex flex-col h-full justify-between gap-8">
                <div>
                    <h1 class="text-3xl md:text-5xl font-bold text-text-primary mb-2 tracking-tight">Good Morning, {{
                        userName() }}</h1>
                    <p class="text-text-secondary text-lg flex items-center gap-2">
                        <span class="material-symbols-outlined text-xl">calendar_today</span>
                        {{ currentDate() | date:'EEEE, MMM d, y' }}
                    </p>
                </div>
                <div class="flex flex-col sm:flex-row items-start sm:items-end justify-between gap-4">
                    <div
                        class="flex items-center gap-3 bg-surface-variant pr-4 pl-1.5 py-1.5 rounded-full backdrop-blur-sm border border-white/5">
                        <div class="size-8 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined text-lg">bolt</span>
                        </div>
                        <span class="text-sm font-medium text-text-secondary">Focus: {{ focus() }}</span>
                    </div>
                    <button
                        class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-background-dark px-6 py-3 rounded-full font-bold text-sm transition-transform active:scale-95 cursor-pointer">
                        <span>Open Today's Board</span>
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 flex flex-col gap-4 ">
            @for (stat of quickStats(); track stat.label) {
            <div class="flex-1 bg-surface rounded-[2rem] p-6 flex items-center justify-between">
                <div>
                    <p class="text-text-secondary text-sm font-medium mb-1">{{ stat.label }}</p>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-text-secondary">{{ stat.value }}</span>
                        @if (stat.change) {
                        <span class="text-sm font-medium rounded-full px-2 py-0.5" [class]="stat.changeColor || ''">{{
                            stat.change }}</span>
                        }
                    </div>
                </div>
                <div class="size-12 rounded-full flex items-center justify-center" [class]="stat.color">
                    <span class="material-symbols-outlined" [class.filled]="stat.icon === 'local_fire_department'"
                        [style.font-variation-settings]="stat.icon === 'local_fire_department' ? '\'FILL\' 1' : null">
                        {{ stat.icon }}
                    </span>
                </div>
            </div>
            }
        </div>
    </div>


    <div class="flex items-center justify-between mb-4 px-2">
        <h2 class="text-xl font-bold text-text-secondary tracking-tight">The Week Ahead</h2>
        <button
            class="text-text-secondary hover:text-white text-sm font-medium flex items-center gap-1 transition-colors">
            View Calendar <span class="material-symbols-outlined text-sm">chevron_right</span>
        </button>
    </div>

    <app-week-view></app-week-view>

    <app-life-map></app-life-map>

    <div class="flex justify-center pb-8 pt-4">
        <p class="text-text-secondary text-sm">LifeBoard © 2023</p>
    </div>
</div>
